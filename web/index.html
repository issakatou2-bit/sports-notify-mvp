<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SPOWatch!</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #0B0E14;
    --surface: #12161F;
    --surface-raised: #171C27;
    --border: #232838;
    --text: #F2F0E6;
    --text-dim: #8891A3;
    --accent: #FFB020;
    --accent-dim: #4A3A1A;
    --jp: #49C5B6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(1.5rem, env(safe-area-inset-bottom));
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    line-height: 1.6;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0;
  }
  p.sub {
    font-size: 13px;
    color: var(--text-dim);
    margin: 6px 0 1.5rem;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0 0 10px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin: 1.25rem 0 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 9px 0;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    border-radius: 7px;
  }
  .tab.active {
    color: #0B0E14;
    background: var(--accent);
  }
  .card .time-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 0 6px;
  }
  .card {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 12px;
  }
  .card .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    gap: 8px;
  }
  .card .league {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .card .matchup {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .card .reason {
    font-size: 13px;
    color: var(--text-dim);
    margin: 4px 0;
  }
  .card .ai-summary {
    font-size: 14px;
    color: var(--text);
    margin: 2px 0 10px;
    line-height: 1.5;
  }
  .board {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .schedule-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
    border-left: 3px solid transparent;
  }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-row.notable {
    border-left: 3px solid var(--accent);
    background: rgba(255, 176, 32, 0.06);
  }
  .schedule-row .time {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    width: 46px;
    flex-shrink: 0;
    font-size: 12px;
  }
  .schedule-row .matchup-abbr {
    flex-grow: 1;
  }
  .schedule-row .league-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .section {
    margin-top: 2rem;
  }
  button {
    background: var(--surface-raised);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
  }
  button:active {
    transform: scale(0.98);
    border-color: var(--accent);
  }
  #status {
    font-size: 13px;
    color: var(--text-dim);
    margin: 10px 0;
    white-space: pre-wrap;
  }
  textarea {
    width: 100%;
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px;
    height: 110px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="brand"><span class="brand-dot"></span><h1>SPOWatch!</h1></div>
<p class="sub">端末内のフォロー設定に応じて、注目理由つきで表示します</p>

<div class="tabs" id="tabs">
  <div class="tab active" data-league="MLB">MLB</div>
  <div class="tab" data-league="SOCCER">5大リーグ</div>
</div>

<p class="eyebrow">Today's Pick</p>
<div id="notableGames">読み込み中...</div>

<div class="section">
  <p class="eyebrow">Today's Board (JST)</p>
  <div class="board" id="allGames"></div>
</div>

<div class="section">
  <p class="sub">通知の設定(初回のみ)</p>
  <button id="subscribeBtn">通知を有効にする</button>
  <div id="status"></div>
  <div id="subscriptionBox" style="display:none;">
    <p class="sub">↓ これをコピーして GitHub Secrets の PUSH_SUBSCRIPTION に登録してください</p>
    <textarea id="subscriptionText" readonly></textarea>
    <button id="copyBtn">コピー</button>
  </div>
</div>

<script>
  // ここは generate_vapid_keys.py で生成した公開鍵に必ず差し替えること
  const VAPID_PUBLIC_KEY = 'BNx05ds6oaPccl3zB-nLCh-tqDeBFOBTuKDoacF3dGSD2_KNmq-JvWlfQtKA2Sg6kuF86ftta97-VNMPL0qnRsE';

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  function nameWithAbbr(name, abbr) {
    return abbr ? `${name}(${abbr})` : name;
  }

  const SOCCER_LEAGUES = ['プレミアリーグ', 'ラ・リーガ', 'セリエA', 'ブンデスリーガ', 'リーグ・アン'];

  let allGamesCache = [];
  let activeLeague = 'MLB';

  function renderTab() {
    const notableEl = document.getElementById('notableGames');
    const allEl = document.getElementById('allGames');

    const games = allGamesCache.filter((g) =>
      activeLeague === 'MLB' ? g.league === 'MLB' : SOCCER_LEAGUES.includes(g.league)
    );

    if (games.length === 0) {
      const msg = activeLeague === 'MLB' ? '今日はMLBの試合がありません' : '今はシーズンオフのため試合がありません';
      notableEl.innerHTML = '<p class="sub">' + msg + '</p>';
      allEl.innerHTML = '';
      return;
    }

    // --- 今日の注目試合(スクショで収まるよう1試合に絞る) ---
    const top = [...games].sort((a, b) => b.score - a.score)[0];
    notableEl.innerHTML = '';
    if (!top.is_notable) {
      notableEl.innerHTML = '<p class="sub">今日は特に注目の試合はありません</p>';
    } else {
      const card = document.createElement('div');
      card.className = 'card';

      if (top.start_time_jst) {
        const time = document.createElement('p');
        time.className = 'time-badge';
        time.textContent = top.start_time_jst + ' (JST)';
        card.appendChild(time);
      }

      const topRow = document.createElement('div');
      topRow.className = 'top';
      topRow.innerHTML =
        '<span class="matchup">' + top.matchup + '</span>' +
        '<span class="league">' + top.league + '</span>';
      card.appendChild(topRow);

      if (top.ai_summary) {
        const ai = document.createElement('p');
        ai.className = 'ai-summary';
        ai.textContent = top.ai_summary;
        card.appendChild(ai);
      }

      (top.reasons || []).forEach((r) => {
        const p = document.createElement('p');
        p.className = 'reason';
        p.textContent = '・' + r.text;
        card.appendChild(p);
      });

      notableEl.appendChild(card);
    }

    // --- 全試合スケジュール(開始時刻順、名前+略称表記) ---
    const bySchedule = [...games].sort((a, b) => {
      const ta = a.start_time_jst || '99/99 99:99';
      const tb = b.start_time_jst || '99/99 99:99';
      return ta.localeCompare(tb);
    });

    allEl.innerHTML = '';
    bySchedule.forEach((g) => {
      const row = document.createElement('div');
      row.className = 'schedule-row' + (g.is_notable ? ' notable' : '');
      const time = g.start_time_jst ? (g.start_time_jst.split(' ')[1] || g.start_time_jst) : '--:--';
      const home = nameWithAbbr(g.home_team_name, g.home_abbr);
      const away = nameWithAbbr(g.away_team_name, g.away_abbr);
      row.innerHTML =
        '<span class="time">' + time + '</span>' +
        '<span class="matchup-abbr">' + home + ' vs ' + away + '</span>' +
        '<span class="league-tag">' + g.league + '</span>';
      allEl.appendChild(row);
    });
  }

  async function renderGames() {
    const notableEl = document.getElementById('notableGames');
    const allEl = document.getElementById('allGames');
    try {
      const res = await fetch('games.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('games.json が見つかりません');
      const data = await res.json();
      allGamesCache = data.games || [];
      renderTab();
    } catch (e) {
      notableEl.innerHTML = '<p class="sub">games.json の読み込みに失敗しました。まだデプロイされていない可能性があります。</p>';
      allEl.innerHTML = '';
    }
  }

  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
    tab.classList.add('active');
    activeLeague = tab.dataset.league;
    renderTab();
  });

  // 左右スワイプでもタブを切り替えられるようにする
  (() => {
    let startX = null;
    document.body.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });
    document.body.addEventListener('touchend', (e) => {
      if (startX === null) return;
      const deltaX = e.changedTouches[0].clientX - startX;
      startX = null;
      if (Math.abs(deltaX) < 60) return;
      const tabs = [...document.querySelectorAll('.tab')];
      const currentIndex = tabs.findIndex((t) => t.classList.contains('active'));
      const nextIndex = deltaX < 0
        ? Math.min(currentIndex + 1, tabs.length - 1)
        : Math.max(currentIndex - 1, 0);
      if (nextIndex !== currentIndex) tabs[nextIndex].click();
    }, { passive: true });
  })();

  async function subscribe() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setStatus('このブラウザ/環境ではプッシュ通知に対応していません。\niOSの場合は、ホーム画面に追加してから開き直してください。');
      return;
    }

    if (VAPID_PUBLIC_KEY.startsWith('REPLACE_WITH')) {
      setStatus('index.html の VAPID_PUBLIC_KEY がまだ設定されていません。\ngenerate_vapid_keys.py で生成した鍵を貼り付けてください。');
      return;
    }

    try {
      const registration = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        setStatus('通知が許可されませんでした。設定アプリから通知を許可してください。');
        return;
      }

      const subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });

      const subJson = JSON.stringify(subscription);
      document.getElementById('subscriptionText').value = subJson;
      document.getElementById('subscriptionBox').style.display = 'block';
      setStatus('購読が完了しました。下のテキストをコピーしてGitHub Secretsに登録してください。');
    } catch (e) {
      setStatus('エラーが発生しました: ' + e.message);
    }
  }

  document.getElementById('subscribeBtn').addEventListener('click', subscribe);
  document.getElementById('copyBtn').addEventListener('click', () => {
    const textarea = document.getElementById('subscriptionText');
    textarea.select();
    document.execCommand('copy');
    setStatus('コピーしました。');
  });

  renderGames();

  // ホーム画面のPWAはSafariの「引っ張って更新」が無いため、アプリが
  // フォアグラウンドに戻ってきたタイミングで自動的に再取得する
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      renderGames();
    }
  });
  window.addEventListener('pageshow', () => {
    renderGames();
  });
</script>

</body>
</html>
